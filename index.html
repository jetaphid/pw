<html lang="pt-BR">
<head>

    <link rel="stylesheet" href="styles.css">
    <title>Calculadora || Alexandre</title>

<body>
    <h1>Minha calculadora legal</h1>

    <p>Informe o primeiro valor</p>
    <input type="number" id="primeiro_numero">

    <p>Informe o segundo valor</p>
    <input type="number" id="segundo_numero">
    
    <br>
    <br>

    <div style="display:flex;" id="div">
        <button onclick="somar()">Somar</button>
        <button onclick="subtrair()">Subtrair</button>
        <button onclick="multiplicar()">Multiplicar</button>
        <button onclick="dividir()">Dividir</button>
    </div>
    <br>
    <p id="resultado">Resultado será exposto aqui :)</p>

    <script src="script.js"></script>
</body>
</html>
